<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPI_Guardian — Console</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.2rem;
            color: #58a6ff;
            letter-spacing: 0.05em;
        }
        .header p {
            color: #8b949e;
            margin-top: 0.5rem;
            font-size: 1rem;
        }
        .status-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem 2.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .status-indicator {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
            margin-right: 8px;
            vertical-align: middle;
        }
        .status-label {
            font-size: 1.1rem;
            vertical-align: middle;
        }
        .version {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DPI_Guardian</h1>
        <p>Console di Monitoraggio DPI Aziendali</p>
    </div>
    <div class="status-card">
        <span class="status-indicator"></span>
        <span class="status-label">Sistema operativo</span>
        <div class="version">Demo · v1.0</div>
    </div>
    <div class="footer">Uso interno riservato</div>
</body>
</html>
